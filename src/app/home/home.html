<div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
  <div class="bg-gradient-to-r from-indigo-600 to-blue-500 p-8 text-white text-center">
    <h1 class="text-3xl font-extrabold mb-2 italic">Xin chào Angular! 👋</h1>
    <p class="text-indigo-100 opacity-90">Tôi đang học Angular Framework tại WEB2081.</p>
  </div>

  <div class="p-10 space-y-8 text-center">
    <div class="flex flex-col md:flex-row gap-6 justify-center">
      <div class="bg-gray-50 p-6 rounded-2xl border border-dashed border-gray-300 w-full md:w-64">
        <span class="text-gray-400 text-xs font-bold uppercase block mb-1">Họ và tên</span>
        <p class="text-xl font-bold text-gray-800">{{ name }}</p>
      </div>
      <div class="bg-gray-50 p-6 rounded-2xl border border-dashed border-gray-300 w-full md:w-64">
        <span class="text-gray-400 text-xs font-bold uppercase block mb-1">Tuổi tác</span>
        <p class="text-xl font-bold text-gray-800">{{ age }} tuổi</p>
      </div>
    </div>

    <button (click)="handleClick()" 
            class="px-10 py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg hover:bg-indigo-700 hover:-translate-y-1 transition-all active:scale-95">
      Nhấn để nhận Alert 🚀
    </button>
  </div>
</div>
