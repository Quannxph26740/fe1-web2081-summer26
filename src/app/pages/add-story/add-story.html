<div class="max-w-2xl mx-auto mt-10 bg-white p-8 rounded-2xl shadow-2xl border border-gray-100">
  <h2 class="text-3xl font-extrabold text-gray-800 mb-6 text-center italic uppercase tracking-tighter">
    Thêm truyện mới 📖
  </h2>

  <form [formGroup]="addForm" (ngSubmit)="submitForm()" class="space-y-6">
    <!-- Tên truyện -->
    <div>
      <label class="block text-sm font-bold text-gray-700 mb-2">Tên truyện</label>
      <input type="text" formControlName="title" 
             class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" 
             placeholder="Nhập tên truyện..." />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Tác giả -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Tác giả</label>
        <input type="text" formControlName="author" 
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" 
               placeholder="Tên tác giả..." />
      </div>
      <!-- Lượt xem -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Lượt xem ban đầu</label>
        <input type="number" formControlName="views" 
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" />
      </div>
    </div>

    <!-- Chọn hình ảnh -->
    <div>
      <label class="block text-sm font-bold text-gray-700 mb-2">Hình ảnh truyện</label>
      <div class="flex items-center justify-center w-full">
        <label class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-gray-300 rounded-2xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
          <div class="flex flex-col items-center justify-center pt-5 pb-6" *ngIf="!imagePreview">
            <svg class="w-8 h-8 mb-4 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
            </svg>
            <p class="text-sm text-gray-500"><span class="font-semibold">Nhấn để tải ảnh</span> hoặc kéo thả</p>
          </div>
          <!-- Hiện ảnh xem trước nếu đã chọn -->
          <img *ngIf="imagePreview" [src]="imagePreview" class="h-full w-full object-cover rounded-2xl" />
          <input type="file" class="hidden" (change)="onFileSelected($event)" accept="image/*" />
        </label>
      </div>
    </div>

    <!-- Nút Submit -->
    <button type="submit" [disabled]="addForm.invalid"
            class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition transform active:scale-95 disabled:bg-gray-400">
      THÊM TRUYỆN NGAY 🚀
    </button>
  </form>
</div>
